name: ci

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  gradle:
    name: gradle test + installDist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run shared tests
        run: ./gradlew :shared:test

      - name: Build TUI distribution
        run: ./gradlew :tui:installDist

      - name: Smoke-test jzw (offline mode)
        run: ./tui/build/install/jzw/bin/jzw --no-llm 你好

  nix:
    name: nix build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: nix build .#
        run: nix build .# --print-build-logs

      - name: Smoke-test built jzw
        run: ./result/bin/jzw --no-llm 你好
